<div class="dialog-header">
  <div class="header-title-container">
    <mat-icon class="header-icon">chat_bubble</mat-icon>
    <h2 mat-dialog-title class="dialog-title">Enviar Mensaje de Mitigación</h2>
  </div>
  <button mat-icon-button (click)="cerrar()" class="btn-close" [disabled]="enviando">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="dialog-content">
  <!-- Detalle del usuario destinatario -->
  <div class="destinatario-container">
    <mat-icon class="destinatario-icon">person</mat-icon>
    <div class="destinatario-info">
      <span class="destinatario-label">Destinatario</span>
      <strong class="destinatario-val">{{ data.usuario }} ({{ data.correo }})</strong>
    </div>
  </div>

  <form #mensajeForm="ngForm" class="mensaje-form">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Mensaje de mitigación o recomendación</mat-label>
      <textarea matInput rows="5" [(ngModel)]="mensaje" name="mensaje" placeholder="Escribe aquí las recomendaciones para reducir o mitigar la huella de carbono..." required [disabled]="enviando"></textarea>
    </mat-form-field>
  </form>

  <div *ngIf="errorMsg" class="error-container">
    <mat-icon class="error-icon">warning</mat-icon>
    <span>{{ errorMsg }}</span>
  </div>

  <div *ngIf="exitoMsg" class="exito-container">
    <mat-icon class="exito-icon">check_circle</mat-icon>
    <span>{{ exitoMsg }}</span>
  </div>
</mat-dialog-content>

<div mat-dialog-actions class="dialog-actions">
  <button mat-stroked-button (click)="cerrar()" class="btn-secondary" [disabled]="enviando">
    Cancelar
  </button>
  <button mat-flat-button color="primary" (click)="enviar()" class="btn-primary" [disabled]="enviando || !mensaje.trim()">
    <mat-icon>send</mat-icon>
    Enviar
  </button>
</div>
